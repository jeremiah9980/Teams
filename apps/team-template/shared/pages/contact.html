<!-- Contact Page Template -->
<!-- Copy and customize for each team -->

<section class="hero" style="min-height: 40vh;">
  <div class="hero-content">
    <h1 class="hero-title">Contact Us</h1>
    <p class="hero-tagline">We'd love to hear from you</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-grid" style="max-width: 900px; margin: 0 auto;">
      <div class="contact-item">
        <div class="contact-icon">📧</div>
        <div>
          <div class="contact-label">Email</div>
          <a href="mailto:[EMAIL]" class="contact-value" style="color: var(--color-primary); text-decoration: none;">[EMAIL]</a>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">📱</div>
        <div>
          <div class="contact-label">Phone</div>
          <a href="tel:[PHONE]" class="contact-value" style="color: var(--color-primary); text-decoration: none;">[PHONE]</a>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">📍</div>
        <div>
          <div class="contact-label">Location</div>
          <div class="contact-value">[CITY, STATE]</div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">👤</div>
        <div>
          <div class="contact-label">Head Coach</div>
          <div class="contact-value">[COACH NAME]</div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section" style="background: rgba(var(--color-primary-rgb), 0.05);">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Send Us a Message</h2>
      <p class="section-subtitle">Fill out the form below and we'll get back to you</p>
    </div>

    <form style="max-width: 600px; margin: 0 auto;">
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Name</label>
        <input type="text" required style="width: 100%; padding: 14px 18px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: 10px; color: white; font-size: 1rem;">
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Email</label>
        <input type="email" required style="width: 100%; padding: 14px 18px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: 10px; color: white; font-size: 1rem;">
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Phone</label>
        <input type="tel" style="width: 100%; padding: 14px 18px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: 10px; color: white; font-size: 1rem;">
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Subject</label>
        <select style="width: 100%; padding: 14px 18px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: 10px; color: white; font-size: 1rem;">
          <option value="">Select a topic...</option>
          <option value="tryout">Tryout Information</option>
          <option value="registration">Registration Questions</option>
          <option value="sponsor">Sponsorship Inquiry</option>
          <option value="general">General Question</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div style="margin-bottom: 30px;">
        <label style="display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8);">Message</label>
        <textarea rows="5" required style="width: 100%; padding: 14px 18px; background: var(--color-card); border: 1px solid var(--color-border); border-radius: 10px; color: white; font-size: 1rem; resize: vertical;"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
    </form>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Follow Us</h2>
      <p class="section-subtitle">Stay connected on social media</p>
    </div>
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
      <a href="#" class="btn btn-outline" style="min-width: 150px;">📸 Instagram</a>
      <a href="#" class="btn btn-outline" style="min-width: 150px;">📘 Facebook</a>
      <a href="#" class="btn btn-outline" style="min-width: 150px;">🐦 Twitter</a>
    </div>
  </div>
</section>
